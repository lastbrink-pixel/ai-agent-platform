<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Petr Savrasov - AI / Platform Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6E56CF"/>
      <stop offset="0.5" stop-color="#2496ED"/>
      <stop offset="1" stop-color="#3DA639"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="6" y="294" fill="url(#accent)"/>

  <!-- pixel motif (nods to the avatar) -->
  <g fill="#9bd3e0" opacity="0.9">
    <rect x="930" y="70"  width="34" height="34" rx="4"/>
    <rect x="980" y="70"  width="34" height="34" rx="4"/>
    <rect x="955" y="110" width="34" height="34" rx="4"/>
    <rect x="930" y="150" width="34" height="34" rx="4"/>
    <rect x="980" y="150" width="34" height="34" rx="4"/>
  </g>
  <g fill="#6E56CF" opacity="0.55">
    <rect x="1040" y="95"  width="22" height="22" rx="3"/>
    <rect x="1075" y="130" width="22" height="22" rx="3"/>
    <rect x="1040" y="165" width="22" height="22" rx="3"/>
  </g>

  <!-- text -->
  <text x="80" y="130" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="2">PETR SAVRASOV</text>
  <text x="82" y="178" font-family="'Consolas','SF Mono',monospace" font-size="26" fill="#8b949e">AI / Platform Engineer</text>

  <g font-family="'Consolas','SF Mono',monospace" font-size="18" fill="#c9d1d9">
    <text x="82" y="228">Python</text>
    <text x="172" y="228" fill="#484f58">·</text>
    <text x="192" y="228">Docker</text>
    <text x="282" y="228" fill="#484f58">·</text>
    <text x="302" y="228">LiteLLM</text>
    <text x="402" y="228" fill="#484f58">·</text>
    <text x="422" y="228">n8n</text>
    <text x="478" y="228" fill="#484f58">·</text>
    <text x="498" y="228">MLOps</text>
    <text x="588" y="228" fill="#484f58">·</text>
    <text x="608" y="228">Self-hosted LLM agents</text>
  </g>
</svg>
